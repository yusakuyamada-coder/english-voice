<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>発音トレーニング</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink: #FF6B8A;
      --pink-light: #FFE8ED;
      --purple: #A78BFA;
      --purple-light: #EDE9FE;
      --mint: #34D399;
      --mint-light: #D1FAE5;
      --yellow: #FBBF24;
      --yellow-light: #FEF3C7;
      --bg: #FFF5F7;
      --card: #FFFFFF;
      --text: #2D2540;
      --gray: #9CA3AF;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1rem 1rem 3rem;
    }
    .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; }

    /* ── ヘッダー ── */
    .header {
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      color: white;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .app-title { font-size: 15px; font-weight: 900; letter-spacing: 0.03em; }
    .q-counter {
      font-size: 12px; font-weight: 700;
      background: rgba(255,255,255,0.25);
      padding: 4px 12px; border-radius: 99px;
    }
    .progress-track { background: rgba(255,255,255,0.3); border-radius: 99px; height: 7px; overflow: hidden; }
    .progress-bar { height: 100%; background: white; border-radius: 99px; width: 0%; transition: width 0.5s ease; }

    /* ── カテゴリバッジ ── */
    .category-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 99px;
      font-size: 12px; font-weight: 800; letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .cat-lr    { background: var(--pink-light);   color: var(--pink); }
    .cat-th    { background: var(--purple-light);  color: var(--purple); }
    .cat-vb    { background: var(--mint-light);    color: #059669; }
    .cat-link  { background: var(--yellow-light);  color: #D97706; }

    /* ── 問題カード ── */
    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.6rem 1.4rem;
      border: 2px solid transparent;
      box-shadow: 0 4px 20px rgba(167,139,250,0.12);
      text-align: center;
    }
    .phonetic-hint {
      font-size: 12px; color: var(--gray); font-weight: 600;
      background: #F9FAFB; border-radius: 8px;
      padding: 6px 12px; display: inline-block; margin-bottom: 14px;
      font-style: italic;
    }
    .question-en {
      font-size: 22px; font-weight: 800; color: var(--text);
      line-height: 1.5; margin-bottom: 6px;
    }
    .question-ja {
      font-size: 13px; color: var(--gray); font-weight: 600; text-align: center;
    }

    /* ── お手本音声プレーヤー ── */
    .model-audio-wrap {
      background: linear-gradient(135deg, var(--purple-light) 0%, var(--pink-light) 100%);
      border-radius: 14px; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 8px;
      min-width: 0; width: 100%;
    }
    .play-model-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      border: none; color: white; cursor: pointer;
      font-size: 16px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(167,139,250,0.4);
      transition: transform 0.15s;
    }
    .play-model-btn:hover { transform: scale(1.08); }
    .play-model-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .model-audio-label { font-size: 12px; font-weight: 700; color: #6D28D9; white-space: nowrap; }
    .model-audio-sub   { font-size: 10px; color: var(--gray); white-space: nowrap; }

    /* ボイス切り替え */
    .voice-toggle { display: flex; gap: 6px; flex-shrink: 0; }
    .voice-btn {
      padding: 4px 8px; border-radius: 99px; border: 1.5px solid #DDD6FE;
      background: white; color: var(--purple); font-size: 10px; font-weight: 700;
      cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .voice-btn.active {
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      color: white; border-color: transparent;
    }
    .voice-btn:hover:not(.active) { background: var(--purple-light); }

    /* ── 結果カード ── */
    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.4rem;
      box-shadow: 0 4px 20px rgba(255,107,138,0.1);
      display: none;
    }
    .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .score-circle {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
      color: white; font-size: 18px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 4px 12px rgba(255,107,138,0.4);
    }
    .score-label { font-size: 13px; color: var(--gray); font-weight: 600; }
    .score-title { font-size: 16px; font-weight: 800; color: var(--text); }

    /* ── 音声比較エリア ── */
    .audio-compare {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
    }
    .audio-box {
      border-radius: 14px; padding: 10px 12px; text-align: center;
    }
    .audio-box.model-box {
      background: var(--purple-light);
    }
    .audio-box.user-box {
      background: var(--pink-light);
    }
    .audio-box-title { font-size: 10px; font-weight: 800; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    .model-box .audio-box-title { color: var(--purple); }
    .user-box  .audio-box-title  { color: var(--pink); }
    .mini-play-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; margin: 0 auto;
      font-size: 15px; transition: transform 0.15s;
    }
    .mini-play-btn:hover { transform: scale(1.1); }
    .mini-play-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .model-box .mini-play-btn { background: var(--purple); color: white; box-shadow: 0 3px 8px rgba(167,139,250,0.4); }
    .user-box  .mini-play-btn  { background: var(--pink);   color: white; box-shadow: 0 3px 8px rgba(255,107,138,0.4); }



    /* ── フィードバック ── */
    .feedback-section { margin-bottom: 10px; }
    .feedback-label {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--gray); margin-bottom: 6px;
    }
    .transcript-text {
      background: #FFF5F7; border-radius: 10px;
      padding: 10px 12px; font-size: 14px; font-weight: 600;
      color: var(--text); line-height: 1.6; margin-bottom: 10px;
    }
    /* フィードバック3ブロック */
    .fb-block { border-radius: 12px; padding: 11px 13px; font-size: 13px; line-height: 1.8; margin-bottom: 8px; }
    .fb-block:last-child { margin-bottom: 0; }
    .fb-praise  { background: #D1FAE5; color: #065F46; }
    .fb-warning { background: #FFE8ED; color: #9F1239; }
    .fb-hint    { background: #EDE9FE; color: #4C1D95; }
    .fb-block-title { font-size: 11px; font-weight: 900; margin-bottom: 4px; letter-spacing: 0.04em; }
    .fb-praise  .fb-block-title { color: #059669; }
    .fb-warning .fb-block-title { color: var(--pink); }
    .fb-hint    .fb-block-title { color: var(--purple); }
    /* 問題単語ハイライト */
    .word-bad  { background: var(--pink); color: white; border-radius: 4px; padding: 1px 5px; font-weight: 800; font-size: 12px; }
    .word-good { background: var(--mint); color: white; border-radius: 4px; padding: 1px 5px; font-weight: 800; font-size: 12px; }

    .running-scores {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
    }
    .mini-score-box { background: #F9FAFB; border-radius: 12px; padding: 10px; text-align: center; }
    .mini-score-box .num { font-size: 20px; font-weight: 900; color: var(--purple); }
    .mini-score-box .lbl { font-size: 10px; color: var(--gray); font-weight: 700; }

    /* ── コントロール ── */
    .controls { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .status-text { font-size: 13px; font-weight: 700; color: var(--gray); }

    .rec-btn {
      width: 82px; height: 82px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
      color: white; font-size: 34px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,107,138,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-btn:hover { transform: scale(1.05); }
    .rec-btn.recording {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 8px 24px rgba(239,68,68,0.5);
      animation: pulse 1.2s infinite;
    }
    .rec-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    .next-btn, .restart-btn {
      width: 100%; padding: 14px; border: none; border-radius: 99px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
      color: white; font-size: 15px; font-weight: 800;
      cursor: pointer; display: none;
      box-shadow: 0 4px 16px rgba(255,107,138,0.35);
      transition: opacity 0.2s;
    }
    .next-btn:hover, .restart-btn:hover { opacity: 0.9; }

    .retry-btn {
      width: 100%; padding: 11px; background: white; color: var(--gray);
      border: 1.5px solid #E5E7EB; border-radius: 99px;
      font-size: 13px; font-weight: 700; cursor: pointer; display: none;
      font-family: 'Nunito', sans-serif;
    }
    .retry-btn:hover { background: #F9FAFB; }

    /* ── 分析中プログレス ── */
    .progress-wrap { width: 100%; display: none; flex-direction: column; align-items: center; gap: 8px; }
    .progress-wrap.show { display: flex; }
    .progress-pct { font-size: 26px; font-weight: 900; color: var(--purple); }
    .analysis-track { width: 100%; background: #E5E7EB; border-radius: 99px; height: 8px; overflow: hidden; }
    .analysis-bar { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 99px; width: 0%; transition: width 0.4s; }
    .progress-step { font-size: 12px; color: var(--gray); font-weight: 600; }

    /* ── 最終カード ── */
    .final-card {
      background: var(--card); border-radius: var(--radius);
      padding: 1.6rem 1.4rem; text-align: center;
      box-shadow: 0 4px 20px rgba(167,139,250,0.15); display: none;
    }
    .final-emoji { font-size: 48px; margin-bottom: 8px; }
    .final-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .final-sub { font-size: 13px; color: var(--gray); font-weight: 600; margin-bottom: 16px; }
    .final-score-big {
      font-size: 64px; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 4px;
    }
    .final-score-label { font-size: 12px; color: var(--gray); font-weight: 700; margin-bottom: 20px; }
    .final-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .final-box { background: #F9FAFB; border-radius: 14px; padding: 14px; }
    .final-box .lbl { font-size: 10px; color: var(--gray); font-weight: 700; margin-bottom: 4px; }
    .final-box .num { font-size: 28px; font-weight: 900; color: var(--purple); }

    .cat-breakdown { text-align: left; }
    .cat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #F3F4F6; font-size: 13px;
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-row-name { color: #555; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .cat-row-score { font-weight: 900; color: var(--purple); }

    .final-msg {
      background: linear-gradient(135deg, var(--pink-light), var(--purple-light));
      border-radius: 14px; padding: 14px;
      font-size: 13px; color: #6D28D9; font-weight: 700;
      margin-top: 16px; text-align: center;
    }

    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.35s ease; }
  </style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header" id="topBar">
    <div class="header-top">
      <span class="app-title">🗣️ 発音トレーニング</span>
      <span class="q-counter" id="questionCounter">1 / 5問</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="challengeBar"></div>
    </div>
  </div>

  <!-- 問題カード -->
  <div class="question-card fade-up" id="questionCard">
    <div id="categoryBadge" class="category-badge cat-lr">🔤 L と R</div>
    <div id="phoneticHint" class="phonetic-hint">発音のポイント：...</div>
    <div id="questionEn" class="question-en">Loading...</div>
    <div id="questionJa" class="question-ja">読み込み中...</div>
    <div style="margin-top: 14px;">
      <div class="model-audio-wrap">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="play-model-btn" id="playModelBtn" onclick="playModelAudio()" title="お手本を聴く">▶</button>
          <div>
            <div class="model-audio-label">🎧 お手本を聴く</div>
            <div class="model-audio-sub">ネイティブの発音を確認しよう</div>
          </div>
        </div>
        <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
          <div class="voice-toggle">
            <button class="voice-btn active" id="voiceFemale" onclick="setVoice('female')">👩 女性</button>
            <button class="voice-btn" id="voiceMale" onclick="setVoice('male')">👨 男性</button>
          </div>
          <div class="voice-toggle">
            <button class="voice-btn" id="speedSlow" onclick="setSpeed(0.75)">🐢 ゆっくり</button>
            <button class="voice-btn active" id="speedNormal" onclick="setSpeed(1.0)">🎯 標準</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 結果カード -->
  <div class="result-card fade-up" id="resultCard">

    <!-- スコアヘッダー -->
    <div class="result-header">
      <div class="score-circle" id="scoreBig">0</div>
      <div>
        <div class="score-title" id="scoreTitle">分析完了！</div>
        <div class="score-label">総合スコア</div>
      </div>
    </div>

    <!-- 音声比較 -->
    <div class="audio-compare">
      <div class="audio-box model-box">
        <div class="audio-box-title">お手本</div>
        <button class="mini-play-btn" id="resultModelBtn" onclick="playModelAudio()">▶</button>
      </div>
      <div class="audio-box user-box">
        <div class="audio-box-title">あなた</div>
        <button class="mini-play-btn" id="playUserBtn" onclick="playUserAudio()" disabled>▶</button>
      </div>
    </div>



    <!-- 聞き取り -->
    <div class="feedback-section">
      <div class="feedback-label">聞き取り結果</div>
      <div class="transcript-text" id="transcriptText"></div>
    </div>

    <!-- フィードバック -->
    <div class="feedback-section">
      <div class="feedback-label">🌸 フィードバック</div>
      <div id="fbPraise"  class="fb-block fb-praise"  style="display:none"><div class="fb-block-title">✅ 良かった点</div><div id="fbPraiseText"></div></div>
      <div id="fbWarning" class="fb-block fb-warning" style="display:none"><div class="fb-block-title">⚠️ 注意点</div><div id="fbWarningText"></div></div>
      <div id="fbHint"    class="fb-block fb-hint"    style="display:none"><div class="fb-block-title">💡 改善ヒント</div><div id="fbHintText"></div></div>
    </div>

    <!-- 累計スコア -->
    <div class="running-scores">
      <div class="mini-score-box">
        <div class="lbl">Good（80点以上）</div>
        <div class="num" id="goodCount">0 / 0</div>
      </div>
      <div class="mini-score-box">
        <div class="lbl">平均スコア</div>
        <div class="num" id="avgScore">-</div>
      </div>
    </div>

    <button class="retry-btn" id="retryBtn" onclick="retryQuestion()">この問題をもう一度やり直す 🔄</button>
  </div>

  <!-- 最終カード -->
  <div class="final-card fade-up" id="finalCard">
    <div class="final-emoji">🎉</div>
    <div class="final-title">チャレンジ完了！</div>
    <div class="final-sub">5問お疲れ様でした✨</div>
    <div class="final-score-big" id="finalScoreBig">-</div>
    <div class="final-score-label">平均スコア</div>
    <div class="final-grid">
      <div class="final-box"><div class="lbl">Good（80点以上）</div><div class="num" id="finalGood">-</div></div>
      <div class="final-box"><div class="lbl">最高スコア</div><div class="num" id="finalBest">-</div></div>
    </div>
    <div class="cat-breakdown" id="catBreakdown"></div>
    <div class="final-msg" id="finalMsg"></div>
  </div>

  <!-- コントロール -->
  <div class="controls">
    <p id="statusText" class="status-text">🎤 ボタンを押して録音スタート</p>
    <button class="rec-btn" id="recBtn" onclick="toggleRecord()">🎤</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-pct" id="progressPct">0%</div>
      <div class="analysis-track"><div class="analysis-bar" id="analysisBar"></div></div>
      <div class="progress-step" id="progressStep">音声を受信中...</div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ ➔</button>
    <button class="restart-btn" id="restartBtn" onclick="restartChallenge()">もう一度チャレンジ 🔄</button>
  </div>

</div>
<script>
// ── 問題データ ──────────────────────────────────────────────────
const questionBank = [
  // ── L と R（25問） ──────────────────────────────────────────
  { en: "I really love long walks by the river.", ja: "川沿いの長い散歩が本当に好きです。", cat: "LR", hint: "「love」のL（舌先を上の歯茎に当てる）と「river」のR（舌を丸める）の違いに集中！" },
  { en: "Light the lamp on the right side.", ja: "右側のランプに火をつけて。", cat: "LR", hint: "「light」「lamp」のL と「right」のR をしっかり区別しよう！" },
  { en: "The library is really relaxing.", ja: "図書館は本当にリラックスできます。", cat: "LR", hint: "「library」の L で始まり「really」「relaxing」の R が続く難問！" },
  { en: "Roll the ball slowly to the left.", ja: "ボールをゆっくり左に転がして。", cat: "LR", hint: "「Roll」のR と「left」のL をはっきり使い分けよう！" },
  { en: "The red rose smells lovely.", ja: "赤いバラはとてもいい香りがします。", cat: "LR", hint: "「red rose」のRRと「lovely」のLを意識して！" },
  { en: "Please read the label on the right.", ja: "右側のラベルを読んでください。", cat: "LR", hint: "「read」のR、「label」「left」のLを区別して！" },
  { en: "Larry lost his lucky rabbit.", ja: "ラリーは幸運なウサギを失った。", cat: "LR", hint: "「Larry」「lucky」「rabbit」にL とR が交互に登場！" },
  { en: "The rain in the lane looks lovely.", ja: "車線の雨が美しく見えます。", cat: "LR", hint: "「rain」のR と「lane」「lovely」のL を区別しよう！" },
  { en: "Laura really likes rural areas.", ja: "ローラは田舎の地域がとても好きです。", cat: "LR", hint: "「Laura」「likes」はL、「really」「rural」はR — 超難問！" },
  { en: "Let's try a really long run.", ja: "本当に長いランをやってみよう。", cat: "LR", hint: "「Let's」「long」はL、「really」「run」はR！" },
  { en: "The road leads to the left.", ja: "その道は左に続いています。", cat: "LR", hint: "「road」のR と「leads」「left」のL を区別して！" },
  { en: "Richard loves reading long novels.", ja: "リチャードは長編小説を読むのが大好きです。", cat: "LR", hint: "「Richard」「reading」はR、「loves」「long」はL！" },
  { en: "Right now I'd like to relax.", ja: "今すぐリラックスしたいです。", cat: "LR", hint: "「Right」「relax」はR、「like」はL！" },

// ── ランダム5問選出（各カテゴリから均等に） ──────────────────
function buildQuestions() {
  const cats = ["LR", "TH", "VB", "LINK"];
  const result = [];
  // 各カテゴリから1問は必ず
  cats.forEach(cat => {
    const pool = questionBank.filter(q => q.cat === cat);
    result.push(pool[Math.floor(Math.random() * pool.length)]);
  });
  // 5問目はランダム
  const last = questionBank[Math.floor(Math.random() * questionBank.length)];
  result.push(last);
  // シャッフル
  return result.sort(() => Math.random() - 0.5);
}

// ── 初期化 ──────────────────────────────────────────────────

  challengeQuestions = buildQuestions();
  currentIndex = 0;
  scores = [];
  catScores = {};
  pendingScore = null;
  userAudioBlob = null;
  if (modelAudio) { modelAudio.pause(); modelAudio = null; }

  const q = challengeQuestions[currentIndex];

  document.getElementById('categoryBadge').textContent = `${cat.icon} ${cat.label}`;

  document.getElementById('phoneticHint').textContent = `💡 ${q.hint}`;
  document.getElementById('questionEn').textContent = q.en;
  document.getElementById('questionJa').textContent = q.ja;
  document.getElementById('questionCounter').textContent = `${currentIndex + 1} / ${TOTAL}問`;
  document.getElementById('challengeBar').style.width = `${(currentIndex / TOTAL) * 100}%`;

// ── お手本音声（ElevenLabs TTS） ─────────────────────────────
let currentModelAudio = null;
const VOICES = {
  female: 'EXAVITQu4vr4xnSDxMaL', // Sarah
  male:   'TxGEqnHWrfWFTfGW9XjX',  // Josh
};
let selectedVoice = 'female';

let selectedSpeed = 1.0;

function setVoice(gender) {
  selectedVoice = gender;
  document.getElementById('voiceFemale').classList.toggle('active', gender === 'female');
  document.getElementById('voiceMale').classList.toggle('active', gender === 'male');
}

function setSpeed(speed) {
  selectedSpeed = speed;
  document.getElementById('speedSlow').classList.toggle('active', speed === 0.75);
  document.getElementById('speedNormal').classList.toggle('active', speed === 1.0);
}

async function playModelAudio() {
  const q = challengeQuestions[currentIndex];

  // 再生中なら停止
  if (currentModelAudio) {
    currentModelAudio.pause();
    currentModelAudio = null;
  }

  const btn = document.getElementById('playModelBtn');
  const btn2 = document.getElementById('resultModelBtn');
  [btn, btn2].forEach(b => { if(b) b.textContent = '⏳'; });

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: q.en, voiceId: selectedVoice, speed: selectedSpeed })
    });
    if (!res.ok) throw new Error('TTS error');
    const blob = await res.blob();
    currentModelAudio = new Audio(URL.createObjectURL(blob));
    currentModelAudio.onended = () => {
      [btn, btn2].forEach(b => { if(b) b.textContent = '▶'; });
    };
    currentModelAudio.play();
    [btn, btn2].forEach(b => { if(b) b.textContent = '🔊'; });
  } catch(e) {
    // フォールバック：Web Speech API
    [btn, btn2].forEach(b => { if(b) b.textContent = '▶'; });
    const utterance = new SpeechSynthesisUtterance(q.en);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }
}

// ── ユーザー音声再生 ─────────────────────────────────────────
function playUserAudio() {
  if (!userAudioBlob) return;
  if (userAudioPlayer) { userAudioPlayer.pause(); userAudioPlayer = null; }
  userAudioPlayer = new Audio(URL.createObjectURL(userAudioBlob));
  userAudioPlayer.play();
}

// ── 録音 ────────────────────────────────────────────────────
async function toggleRecord() {
  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('recBtn').textContent = '🎤';
    document.getElementById('statusText').textContent = 'AI が分析中...';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // サポートされる形式を選択（AzureはWAV/PCMが最も安定）
    const mimeType = MediaRecorder.isTypeSupported('audio/wav') ? 'audio/wav'
                   : MediaRecorder.isTypeSupported('audio/webm;codecs=pcm') ? 'audio/webm;codecs=pcm'
                   : 'audio/webm;codecs=opus';
    recordingMimeType = mimeType;
    mediaRecorder = new MediaRecorder(stream, {
      mimeType,
      audioBitsPerSecond: 16000,
    });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      if (isCancelled || !audioChunks.length) { isCancelled = false; return; }
      const blob = new Blob(audioChunks, { type: recordingMimeType });
      userAudioBlob = blob;

      try {
        // WebM/opusをPCM(WAV)に変換してAzureに送る
        const arrayBuf = await blob.arrayBuffer();
        const audioCtx = new AudioContext({ sampleRate: 16000 });
        const decoded = await audioCtx.decodeAudioData(arrayBuf);
        await audioCtx.close();
        const pcmData = decoded.getChannelData(0);
        const wavBuffer = pcmToWav(pcmData, 16000);
        const base64 = arrayBufferToBase64(wavBuffer);
        processAnswer(base64, 'audio/wav');
      } catch(e) {
        console.error('PCM変換エラー:', e);
        try {
          // フォールバック：元のblobをそのまま送る
          const base64 = await new Promise((resolve, reject) => {
            const rd = new FileReader();
            rd.onload = () => resolve(rd.result.split(',')[1]);
            rd.onerror = reject;
            rd.readAsDataURL(blob);
          });
          processAnswer(base64, recordingMimeType);
        } catch(e2) {
          console.error('フォールバックエラー:', e2);
          completeProgress();
          document.getElementById('statusText').innerHTML = '<span style="color:#ef4444">音声の処理に失敗しました。もう一度お試しください。</span>';
          document.getElementById('recBtn').disabled = false;
        }
      }
    };
    // 0.3秒後に録音開始（Azureが最初の音を取りこぼさないように）
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recBtn').textContent = '⏹';
    document.getElementById('statusText').textContent = '準備中...';
    setTimeout(() => {
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('statusText').textContent = '録音中...（もう一度押すと停止）';
    }, 300);

    // 10秒で自動停止（分析はしない）
    setTimeout(() => {
      if (isRecording) {
        isCancelled = true;   // 分析をスキップするフラグ
        audioChunks = [];
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('recBtn').classList.remove('recording');
        document.getElementById('recBtn').textContent = '🎤';
        document.getElementById('statusText').textContent = '録音が長すぎます（10秒以内で話してください）。';
      }
    }, 10000);
  } catch(e) { alert('マイクを許可してください'); }
}

// ── API 処理 ─────────────────────────────────────────────────
async function processAnswer(base64, mimeType) {
  const q = challengeQuestions[currentIndex];
  const cat = CAT_INFO[q.cat];
  showProgress();
  document.getElementById('recBtn').disabled = true;

  try {
    // Step1: Azure Pronunciation Assessment で採点
    const azureRes = await fetch('/api/pronunciation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64Audio: base64, referenceText: q.en, mimeType: mimeType })
    });
    const azureData = await azureRes.json();
    console.log('Azure result:', azureData);

    if (azureData.error) throw new Error(azureData.error);

    // Step2: Gemini が音声を直接聞いてカテゴリ特有のミスを追加チェック＋フィードバック生成
    const badWordNames = azureData.badWords.map(w => w.word);
    const wordDetails = azureData.allWords.map(w => `${w.word}:${w.accuracy}点`).join(', ');
    const phonemeDetails = azureData.badWords.map(w =>
      `${w.word}(${(w.phonemes||[]).map(p => `/${p.phoneme}/:${p.score}点`).join(',')})`
    ).join(', ');

    const prompt = `あなたはネイティブ英語発音の厳格なコーチです。生徒が「${q.en}」を発音した音声を直接聞いて評価してください。
発音カテゴリ：${cat.label}

Azureの機械評価結果（参考）：
- 総合：${azureData.pronScore}点、精度：${azureData.accuracyScore}点、流暢さ：${azureData.fluencyScore}点、韻律：${azureData.prosodyScore}点
- 単語別：${wordDetails}
- 問題音素：${phonemeDetails || 'なし'}

【あなたのタスク】
1. 音声を直接聞いて、特に${cat.label}に特有のミスを耳で確認する
2. 以下の日本人特有ミスを重点チェック：
   - LとR：Rが「ラリルレロ」になっていないか、Lで舌が歯茎に触れているか
   - TH：「ス/ズ/ダ」で代替していないか
   - VとB：VでBを使っていないか（上唇ではなく下唇を使うべき）
   - リンキング：単語が自然につながっているか
3. Azureが高得点の場合は基本的にそのまま。よほど明らかにネイティブと違う場合のみ adjusted_score を少し下げる
4. 問題なければ adjusted_score はAzureのスコアのまま

以下のJSON形式のみで回答（コードブロック不要）:
{"adjusted_score":0-100の整数,"praise":"良かった点1〜2文（日本語）","warning":"${cat.label}特有の問題を単語・音素レベルで具体的に（問題なければnull）","hint":"次回の改善ポイント1〜2文（問題なければnull）","gemini_bad_words":["Geminiが問題と判断した単語（なければ空配列）"]}`;

    const geminiRes = await fetch('/api/correct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64Audio: base64, prompt })
    });
    const geminiData = await geminiRes.json();
    let feedback = { adjusted_score: azureData.pronScore, praise: '', warning: null, hint: null, gemini_bad_words: [] };
    try {
      const rawText = geminiData.candidates[0].content.parts[0].text;
      const jsonMatch = rawText.match(/\{[\s\S]*\}/);
      if (jsonMatch) feedback = { ...feedback, ...JSON.parse(jsonMatch[0]) };
    } catch(e) { console.warn('Gemini feedback parse error', e); }

    // AzureとGeminiのスコアを合算（6:4の重み）
    const rawTotal = Math.round(azureData.pronScore * 0.7 + (feedback.adjusted_score || azureData.pronScore) * 0.3);
    const total = rawTotal >= 92 ? 100 : rawTotal;
    pendingScore = total;
    completeProgress();

    // 累計計算
    const tentative = [...scores, total];
    const goodCount = tentative.filter(s => s >= 80).length;
    const avg = Math.round(tentative.reduce((a, b) => a + b, 0) / tentative.length);

    const scoreTitle = total >= 90 ? '素晴らしい！🌟' : total >= 75 ? 'よくできました！✨' : total >= 60 ? 'いい調子！💪' : 'もう一息！頑張れ！🌱';

    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('scoreBig').textContent = total;
    document.getElementById('scoreTitle').textContent = scoreTitle;

    // AzureとGeminiの問題単語をマージ
    const allWords = azureData.allWords || [];
    const geminiBadWordNames = feedback.gemini_bad_words || [];

    // 同じ単語が重複している場合は最初の1つだけ残す（Insertionの重複除去）
    const seenWords = {};
    const deduped = allWords.filter(w => {
      const key = w.word.toLowerCase();
      if (seenWords[key]) return false;
      seenWords[key] = true;
      return true;
    });

    // 省略・余分・ミスの補正
    const transcriptWords = (azureData.transcript || '').toLowerCase().split(/\s+/);
    const mergedAllWords = deduped.map(w => {
      const inTranscript = transcriptWords.includes(w.word.toLowerCase());
      // 省略：聞き取りテキストに実際にない場合だけ0点。テキストにあれば誤判定なので無視
      if (w.errorType === 'Omission' && !inTranscript) return { ...w, accuracy: 0 };
      if (w.errorType === 'Omission' &&  inTranscript) return { ...w, errorType: 'None' };
      // 余分：Insertionも同様に誤判定が多いので表示だけして減点は軽め
      if (w.errorType === 'Insertion') return { ...w, accuracy: Math.min(w.accuracy, 70) };
      const isGeminiBad = geminiBadWordNames.some(g => g.toLowerCase() === w.word.toLowerCase());
      return isGeminiBad && w.accuracy > 70
        ? { ...w, accuracy: Math.min(w.accuracy, 75), errorType: 'Mispronunciation' }
        : w;
    });
    const badWords = [
      ...azureData.badWords,
      ...geminiBadWordNames
        .filter(g => !azureData.badWords.some(b => b.word.toLowerCase() === g.toLowerCase()))
        .map(g => ({ word: g, accuracy: 60, errorType: 'Mispronunciation', phonemes: [] }))
    ];
    // 聞き取り結果＋問題単語ハイライト
    let transcriptHtml = escHtml(azureData.transcript || '（聞き取れませんでした）');
    badWords.forEach(w => {
      if (w.word.length <= 1) return; // 1文字はハイライト対象外
      const escaped = escHtml(w.word);
      transcriptHtml = transcriptHtml.replace(
        new RegExp('\b' + escaped + '\b', 'gi'),
        `<span class="word-bad">${escaped}</span>`
      );
    });
    document.getElementById('transcriptText').innerHTML = transcriptHtml;

    // フィードバック3ブロック
    if (feedback.praise) {
      document.getElementById('fbPraise').style.display = 'block';
      document.getElementById('fbPraiseText').textContent = feedback.praise;
    }
    if (total < 90 && feedback.warning && feedback.warning !== 'null') {
      document.getElementById('fbWarning').style.display = 'block';
      let warningHtml = escHtml(feedback.warning);
      badWords.forEach(w => {
        if (w.word.length <= 1) return;
        const escaped = escHtml(w.word);
        warningHtml = warningHtml.replace(new RegExp('\b' + escaped + '\b', 'gi'), `<span class="word-bad">${escaped}</span>`);
      });
      document.getElementById('fbWarningText').innerHTML = warningHtml;
    }
    if (total < 90 && feedback.hint && feedback.hint !== 'null') {
      document.getElementById('fbHint').style.display = 'block';
      document.getElementById('fbHintText').textContent = feedback.hint;
    }

    document.getElementById('goodCount').textContent = `${goodCount} / ${tentative.length}`;
    document.getElementById('avgScore').textContent = avg;
    document.getElementById('statusText').textContent = '添削完了！';

    // ユーザー音声再生ボタンを有効化
    document.getElementById('playUserBtn').disabled = false;

    document.getElementById('nextBtn').style.display = 'block';
    document.getElementById('nextBtn').textContent =
      currentIndex + 1 >= TOTAL ? '結果を見る 🏆' : `次の問題へ ➔ (${currentIndex + 2} / ${TOTAL})`;
    document.getElementById('retryBtn').style.display = 'block';
    document.getElementById('recBtn').disabled = false;

  } catch (e) {
    console.error('processAnswer error:', e);
    completeProgress();
    document.getElementById('statusText').innerHTML = `<span style="color:#ef4444">エラー: ${e.message || '不明なエラーが発生しました'}</span>`;
    document.getElementById('recBtn').disabled = false;
    // 次へボタンとリトライボタンを表示して詰まらないようにする
    document.getElementById('retryBtn').style.display = 'block';
  }
}

// PCM Float32Array → WAV ArrayBuffer（前後に無音を追加）
function pcmToWav(pcmData, sampleRate) {
  const silenceSamples = Math.floor(sampleRate * 0.3); // 前後0.3秒の無音
  const totalSamples = silenceSamples + pcmData.length + silenceSamples;
  const buffer = new ArrayBuffer(44 + totalSamples * 2);
  const view = new DataView(buffer);
  const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4,  36 + totalSamples * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1,  true); // PCM
  view.setUint16(22, 1,  true); // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2,  true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, totalSamples * 2, true);
  // 先頭の無音
  for (let i = 0; i < silenceSamples; i++) {
    view.setInt16(44 + i * 2, 0, true);
  }
  // 音声データ
  for (let i = 0; i < pcmData.length; i++) {
    const s = Math.max(-1, Math.min(1, pcmData[i]));
    view.setInt16(44 + (silenceSamples + i) * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  // 末尾の無音
  for (let i = 0; i < silenceSamples; i++) {
    view.setInt16(44 + (silenceSamples + pcmData.length + i) * 2, 0, true);
  }
  return buffer;
}

function arrayBufferToBase64(buffer) {
  // 大きなバッファでもメモリ効率よく変換
  const bytes = new Uint8Array(buffer);
  const chunkSize = 8192;
  let binary = '';
  for (let i = 0; i < bytes.byteLength; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── ナビゲーション ───────────────────────────────────────────
function nextQuestion() {
  if (pendingScore !== null) {
    const q = challengeQuestions[currentIndex];
    scores.push(pendingScore);
    if (!catScores[q.cat]) catScores[q.cat] = { total: 0, count: 0 };
    catScores[q.cat].total += pendingScore;
    catScores[q.cat].count++;
    pendingScore = null;
  }
  currentIndex++;
  if (currentIndex >= TOTAL) showFinalResult();
  else showQuestion();
}

function retryQuestion() {
  pendingScore = null;
  userAudioBlob = null;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('playUserBtn').disabled = true;
  document.getElementById('statusText').textContent = '🎤 ボタンを押して録音スタート';
  document.getElementById('recBtn').disabled = false;
  // フィードバックブロックをリセット
  ['fbPraise','fbWarning','fbHint'].forEach(id => document.getElementById(id).style.display = 'none');
}

function showFinalResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('topBar').style.display = 'none';
  document.getElementById('recBtn').style.display = 'none';
  document.getElementById('statusText').style.display = 'none';

  const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
  const good = scores.filter(s => s >= 80).length;
  const best = Math.max(...scores);

  document.getElementById('finalScoreBig').textContent = avg;
  document.getElementById('finalGood').textContent = `${good} / ${TOTAL}`;
  document.getElementById('finalBest').textContent = best;

  const breakdown = document.getElementById('catBreakdown');
  breakdown.innerHTML = '<div style="font-size:12px;font-weight:800;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">カテゴリ別スコア</div>';
  Object.entries(catScores).forEach(([cat, data]) => {
    const info = CAT_INFO[cat];
    const pavg = Math.round(data.total / data.count);
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `<span class="cat-row-name">${info.icon} ${info.label}</span><span class="cat-row-score">${pavg}点（${data.count}問）</span>`;
    breakdown.appendChild(row);
  });

  const msg = avg >= 90 ? '発音マスター！完璧に近いです 🏆' :
              avg >= 75 ? 'とても上手！着実に上達しています ✨' :
              avg >= 60 ? 'いい調子！練習を続ければもっと伸びる 💪' :
                          '基礎から丁寧に練習しましょう！応援しています 🌱';
  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('finalCard').style.display = 'block';
  document.getElementById('restartBtn').style.display = 'block';
}

function restartChallenge() { startChallenge(); }

// ── プログレス ───────────────────────────────────────────────
const STEPS = [
  { pct: 15, label: '音声を受信中...' },
  { pct: 35, label: '音声を文字に変換中...' },
  { pct: 60, label: '発音を分析中...' },
  { pct: 80, label: 'フィードバックを生成中...' },
  { pct: 92, label: 'もうすぐ完了...' },
];

function showProgress() {
  document.getElementById('progressWrap').classList.add('show');
  let i = 0;
  progressTimer = setInterval(() => {
    if (i >= STEPS.length) { clearInterval(progressTimer); return; }
    setProgress(STEPS[i].pct, STEPS[i].label);
    i++;
  }, 900);
}

function completeProgress() {
  clearInterval(progressTimer);
  setProgress(100, '完了！');
  setTimeout(() => {
    document.getElementById('progressWrap').classList.remove('show');
    setProgress(0, '');
  }, 600);
}

function setProgress(pct, label) {
  document.getElementById('analysisBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressStep').textContent = label;
}
